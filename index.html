<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Racing+Sans+One&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Racing Sans One', sans-serif;
  overflow: hidden;
}

:root {
  --green: #00FFA8;
}

/* 🏁 LOGO */
.liga-logo{
  position:absolute;
  top:20px;
  right:20px;
  width:250px;
}

/* 🪟 GLASS */
.glass{
  background:rgba(0,0,0,0.55);
  backdrop-filter:blur(10px);
  border-radius:14px;
}

/* 🏆 LEADERBOARD */
.leaderboard{
  position:absolute;
  top:30px;
  left:30px;
  width:340px;
  padding:15px;
}

.leaderboard-title{
  color:var(--green);
  margin-bottom:10px;
}

/* ✔ LOGO FIX */
.entry{
  display:flex;
  justify-content:space-between;
  align-items:center;
  color:var(--green);
  margin:6px 0;
}

.entry-left{
  display:flex;
  align-items:center;
  gap:8px;
}

.entry-left img{
  width:24px;
  height:24px;
  object-fit:contain;
}

/* 🏁 ACTIVE */
.lower-third{
  position:absolute;
  bottom:40px;
  left:40px;
  display:flex;
  gap:20px;
  padding:15px;
  border-left:6px solid var(--green);
  opacity:0;
  transform:translateX(-120%);
  transition:0.5s;
}

.lower-third.show{
  opacity:1;
  transform:translateX(0);
}

.team-logo{
  height:70px;
}

.driver{
  font-size:36px;
  color:var(--green);
}

.points{
  font-size:46px;
  color:var(--green);
  text-shadow:
    -2px -2px 0 #000,
     2px -2px 0 #000,
    -2px  2px 0 #000,
     2px  2px 0 #000;
}

/* 🆚 BATTLE (NO BOUNCE SYSTEM) */
.battle{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  display:flex;
  gap:80px;
  align-items:center;

  opacity:0;
  pointer-events:none;

  will-change:transform;
}

.battle.show{
  opacity:1;
}

/* 🔥 ONLY INNER MOVES (NO BOUNCE EVER) */
.battle-inner{
  display:flex;
  gap:80px;
  align-items:center;
  transform:translateY(0);
  will-change:transform;
}

.battle.animate .battle-inner{
  animation:battleMoveUp 1.25s cubic-bezier(0.22,1,0.36,1) forwards;
}

@keyframes battleMoveUp{
  0%{
    transform:translateY(0);
  }
  100%{
    transform:translateY(-300px);
  }
}

.side{
  text-align:center;
  color:var(--green);
}

.vs{
  font-size:60px;
  color:var(--green);
}

/* 📺 TICKER */
.ticker{
  position:absolute;
  bottom:20px;
  right:0;
  width:520px;
  height:70px;
  overflow:hidden;
  display:flex;
  align-items:center;
  padding-left:10px;
  background:rgba(0,0,0,0.55);
  border-left:4px solid var(--green);
}

.ticker-text{
  display:flex;
  gap:80px;
  white-space:nowrap;
  animation:scroll 35s linear infinite;
}

@keyframes scroll{
  0%{transform:translateX(0);}
  100%{transform:translateX(-50%);}
}
</style>
</head>

<body>

<img class="liga-logo" src="liga.png">

<!-- 🏆 LEADERBOARD -->
<div class="leaderboard glass">
  <div class="leaderboard-title">LEADERBOARD</div>
  <div id="leaderboard"></div>
</div>

<!-- 🏁 ACTIVE -->
<div class="lower-third glass" id="lowerThird">
  <img class="team-logo" id="teamLogo">
  <div>
    <div class="driver" id="driver"></div>
    <div class="points" id="points"></div>
  </div>
</div>

<!-- 🆚 BATTLE -->
<div class="battle" id="battle">
  <div class="battle-inner">

    <div class="side">
      <img id="leadLogo" height="80">
      <div id="leadDriver"></div>
    </div>

    <div class="vs">VS</div>

    <div class="side">
      <img id="chaseLogo" height="80">
      <div id="chaseDriver"></div>
      <div id="chaseScore"></div>
    </div>

  </div>
</div>

<!-- 📺 TICKER -->
<div class="ticker">
  <div class="ticker-text" id="ticker"></div>
</div>

<script>
const URL="https://script.google.com/macros/s/AKfycbySJPFhkbuwZSXck342Wv-jghBm01uMyAbT7klp0ZCvr-S9yyG_wCVMcVbT-yK9arFAkQ/exec";

const n=v=>Number(v)||0;
const f=v=>parseFloat(n(v).toFixed(2));

let battleRunning=false;
let lastBattleKey="";

async function load(){
  const res=await fetch(URL);
  const data=await res.json();

  /* 🏆 LEADERBOARD */
  const sorted=[...data].sort((a,b)=>n(b.score)-n(a.score));

  document.getElementById("leaderboard").innerHTML =
    sorted.slice(0,5).map((d,i)=>`
      <div class="entry">
        <div class="entry-left">
          <img src="${d.logo}">
          <span>${d.driver}</span>
        </div>
        <span>${f(d.score)}</span>
      </div>
    `).join("");

  /* 🏁 ACTIVE */
  const active=data.filter(d=>String(d.active).toLowerCase()=="true");
  const lower=document.getElementById("lowerThird");

  if(active.length==1){
    const d=active[0];
    document.getElementById("driver").innerText=d.driver;
    document.getElementById("points").innerText=f(d.points);
    document.getElementById("teamLogo").src=d.logo;
    lower.classList.add("show");
  } else lower.classList.remove("show");

  /* 🆚 BATTLE (ANTI BOUNCE FINAL FIX) */
  const battle=document.getElementById("battle");
  const inner=battle.querySelector(".battle-inner");

  if(active.length<2){
    battle.classList.remove("show","animate");
    battleRunning=false;
    return;
  }

  const a=active[0], b=active[1];
  const key=a.driver+"-"+b.driver;

  document.getElementById("leadDriver").innerText=a.driver;
  document.getElementById("leadLogo").src=a.logo;

  document.getElementById("chaseDriver").innerText=b.driver;
  document.getElementById("chaseLogo").src=b.logo;
  document.getElementById("chaseScore").innerText=f(b.points);

  battle.classList.add("show");

  if(!battleRunning || lastBattleKey!==key){
    battle.classList.remove("animate");
    void inner.offsetWidth;

    battle.classList.add("animate");

    battleRunning=true;
    lastBattleKey=key;
  }

  /* 📺 TICKER */
  let teams={},logos={};

  data.forEach(d=>{
    const t=d.team;
    teams[t]=(teams[t]||0)+n(d.points);
    logos[t]=d.logo;
  });

  const html=Object.entries(teams).map(([t,s])=>`
    <div style="display:flex;gap:15px;align-items:center;">
      <img src="${logos[t]}" height="45">
      <span style="color:#00FFA8">${f(s)}</span>
    </div>
  `).join("");

  document.getElementById("ticker").innerHTML = html + html;
}

setInterval(load,2000);
load();
</script>

</body>
</html>
